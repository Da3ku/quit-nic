<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clearing">
<meta name="theme-color" content="#0E1517">
<title>Clearing</title>
<style>
  :root {
    --bg: #0E1517;
    --surface: #16211F;
    --surface-line: #223330;
    --text: #E9F0ED;
    --muted: #7B8F8A;
    --muted-dim: #536561;
    --teal: 79, 209, 197;
    --accent: rgb(var(--teal));
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, system-ui, sans-serif;
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding:
      calc(env(safe-area-inset-top) + 24px)
      calc(env(safe-area-inset-right) + 22px)
      calc(env(safe-area-inset-bottom) + 32px)
      calc(env(safe-area-inset-left) + 22px);
    max-width: 460px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 26px;
    align-self: flex-start;
  }
  .eyebrow .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 9px;
    vertical-align: middle;
    box-shadow: 0 0 10px var(--accent);
  }

  .ring-wrap {
    position: relative;
    width: 280px; height: 280px;
    margin-bottom: 4px;
    animation: breathe 5.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.018); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ring-wrap { animation: none; }
  }
  svg.ring { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--surface-line); stroke-width: 14; }
  .ring-progress {
    fill: none;
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s cubic-bezier(.22,1,.36,1), stroke 0.9s linear;
  }

  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .pct {
    font-family: ui-rounded, "SF Pro Rounded", ui-sans-serif, system-ui, sans-serif;
    font-size: 62px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .pct .sign { font-size: 30px; font-weight: 600; opacity: 0.7; }
  .pct-label {
    font-size: 12.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 9px;
    font-weight: 600;
  }

  .times {
    display: flex;
    width: 100%;
    margin: 26px 0 8px;
  }
  .time-cell { flex: 1; text-align: center; }
  .time-cell + .time-cell { border-left: 1px solid var(--surface-line); }
  .time-val {
    font-family: ui-rounded, "SF Pro Rounded", ui-sans-serif, system-ui, sans-serif;
    font-size: 22px;
    font-weight: 650;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .time-key {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted-dim);
    margin-top: 6px;
    font-weight: 600;
  }

  .since {
    width: 100%;
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--surface-line);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .since-label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.04em; }
  .since-val {
    font-size: 14px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    margin-top: 3px;
    font-weight: 550;
  }
  .since-edit { font-size: 12.5px; color: var(--accent); font-weight: 650; }
  #picker { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }

  .timeline {
    width: 100%;
    margin-top: 30px;
    display: flex;
    flex-direction: column;
  }
  .timeline-title {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted-dim);
    font-weight: 600;
    margin-bottom: 16px;
  }
  .mile {
    display: flex;
    align-items: flex-start;
    gap: 15px;
    padding-bottom: 20px;
    position: relative;
  }
  .mile:last-child { padding-bottom: 0; }
  .mile-rail {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 2px;
  }
  .mile-node {
    width: 15px; height: 15px;
    border-radius: 50%;
    border: 2px solid var(--surface-line);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 1;
    transition: all 0.5s ease;
  }
  .mile-line {
    position: absolute;
    top: 15px; bottom: -5px;
    width: 2px;
    background: var(--surface-line);
    transition: background 0.5s ease;
  }
  .mile:last-child .mile-line { display: none; }
  .mile-when {
    font-size: 12px;
    color: var(--muted-dim);
    font-weight: 650;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .mile-text {
    font-size: 14.5px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
    transition: color 0.5s ease;
  }

  .mile.passed .mile-node { border-color: var(--accent); background: var(--accent); box-shadow: 0 0 8px rgba(var(--teal), 0.5); }
  .mile.passed .mile-line { background: rgba(var(--teal), 0.5); }
  .mile.passed .mile-text { color: var(--text); }
  .mile.passed .mile-when { color: var(--accent); }

  .mile.next .mile-node {
    border-color: var(--accent);
    background: var(--bg);
    animation: pulse 2s ease-in-out infinite;
  }
  .mile.next .mile-text { color: var(--text); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(var(--teal), 0.5); }
    50% { box-shadow: 0 0 0 6px rgba(var(--teal), 0); }
  }

  .controls {
    width: 100%;
    margin-top: 30px;
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 13px;
    border: 1px solid var(--surface-line);
    background: var(--surface);
    color: var(--muted);
    font-size: 13.5px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:active { background: #1c2927; }
  .btn.danger { color: #E0A44C; }

  .cleared-note {
    width: 100%;
    margin-top: 22px;
    text-align: center;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
    display: none;
  }
</style>
</head>
<body>
  <div class="eyebrow"><span class="dot"></span>Nicotine clearing</div>

  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 280 280">
      <circle class="ring-track" cx="140" cy="140" r="120"></circle>
      <circle class="ring-progress" id="prog" cx="140" cy="140" r="120"></circle>
    </svg>
    <div class="ring-center">
      <div class="pct" id="pct">0<span class="sign">%</span></div>
      <div class="pct-label">of 72&nbsp;h cleared</div>
    </div>
  </div>

  <div class="times">
    <div class="time-cell">
      <div class="time-val" id="elapsed">—</div>
      <div class="time-key">Elapsed</div>
    </div>
    <div class="time-cell">
      <div class="time-val" id="remaining">—</div>
      <div class="time-key">Remaining</div>
    </div>
  </div>

  <div class="since" id="sinceRow">
    <div>
      <div class="since-label">Last puff</div>
      <div class="since-val" id="sinceVal">—</div>
    </div>
    <div class="since-edit">Edit</div>
    <input type="datetime-local" id="picker">
  </div>

  <div class="cleared-note" id="clearedNote">✦ Nicotine fully cleared. Nice work.</div>

  <div class="timeline">
    <div class="timeline-title">What's happening inside</div>
    <div id="miles"></div>
  </div>

  <div class="controls">
    <button class="btn" id="changeBtn">Change start time</button>
    <button class="btn danger" id="resetBtn">Reset to now</button>
  </div>

<script>
  const WINDOW_H = 72;
  const WINDOW_MS = WINDOW_H * 3600 * 1000;
  const KEY = "nic_clearing_start_v1";

  const R = 120;
  const CIRC = 2 * Math.PI * R;

  const MILESTONES = [
    { h: 0.5, label: "30 min", text: "Nicotine in your blood starts to fall. Heart rate and blood pressure begin easing back toward normal — nicotine is a stimulant, so they were running high." },
    { h: 1,   label: "1 h",    text: "Blood nicotine has already dropped by about half. Its half-life is only 1–2 hours, so it leaves fast — the cravings are your brain, not your bloodstream." },
    { h: 3,   label: "2–4 h",  text: "First real cravings and restlessness show up. Each craving only lasts a few minutes, whether or not you vape — so they pass either way." },
    { h: 8,   label: "8 h",    text: "Blood vessels relax and circulation improves now that nicotine isn't squeezing them tight. Hands and feet may feel warmer." },
    { h: 12,  label: "12 h",   text: "Most nicotine is out of your bloodstream. Cravings can spike around here — this is often the toughest stretch. Ride it out." },
    { h: 24,  label: "24 h",   text: "Cardiovascular strain drops noticeably. Withdrawal — irritability, foggy focus, low mood — tends to peak today, then starts fading." },
    { h: 36,  label: "36 h",   text: "Dopamine receptors that nicotine hijacked begin recalibrating. Mood swings are your brain re-learning its own reward system." },
    { h: 48,  label: "48 h",   text: "Nerve endings regrow — taste and smell sharpen, and 'vaper's tongue' fades. Nicotine is essentially undetectable in your blood by now." },
    { h: 60,  label: "60 h",   text: "Throat and mouth irritation from the aerosol keeps settling. Dry mouth eases as you rehydrate — keep water on hand." },
    { h: 72,  label: "72 h",   text: "Nicotine and its main byproduct, cotinine, are largely cleared. Airways relax, breathing feels easier, and the hardest part of physical withdrawal is behind you. Energy climbs from here." },
  ];

  const prog = document.getElementById("prog");
  prog.style.strokeDasharray = CIRC;

  const AMBER = [224, 164, 76];
  const TEAL  = [79, 209, 197];
  function mix(t) {
    const c = AMBER.map((a, i) => Math.round(a + (TEAL[i] - a) * t));
    return `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
  }

  let startMs = null;

  function getStart() {
    try {
      const v = localStorage.getItem(KEY);
      if (v) return parseInt(v, 10);
    } catch (e) {}
    const now = Date.now();
    try { localStorage.setItem(KEY, String(now)); } catch (e) {}
    return now;
  }
  function setStart(ms) {
    startMs = ms;
    try { localStorage.setItem(KEY, String(ms)); } catch (e) {}
    render();
  }

  function fmtDuration(ms) {
    if (ms < 0) ms = 0;
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (h === 0) return `${m}m`;
    return `${h}h ${String(m).padStart(2, "0")}m`;
  }

  function fmtDate(ms) {
    return new Date(ms).toLocaleString(undefined, {
      weekday: "short", hour: "numeric", minute: "2-digit"
    });
  }

  function toPickerValue(ms) {
    const off = new Date(ms).getTimezoneOffset() * 60000;
    return new Date(ms - off).toISOString().slice(0, 16);
  }

  const milesEl = document.getElementById("miles");
  MILESTONES.forEach(m => {
    const label = m.label || (m.h < 1 ? `${Math.round(m.h * 60)} min` : `${m.h} h`);
    const el = document.createElement("div");
    el.className = "mile";
    el.innerHTML = `
      <div class="mile-rail">
        <div class="mile-node"></div>
        <div class="mile-line"></div>
      </div>
      <div class="mile-body">
        <div class="mile-when">${label}</div>
        <div class="mile-text">${m.text}</div>
      </div>`;
    milesEl.appendChild(el);
    m._el = el;
  });

  function render() {
    const start = startMs;
    if (start == null) return;
    const now = Date.now();
    const elapsedMs = now - start;
    let pct = (elapsedMs / WINDOW_MS) * 100;
    pct = Math.max(0, Math.min(100, pct));

    const t = pct / 100;
    const color = mix(t);

    prog.style.strokeDashoffset = CIRC * (1 - t);
    prog.style.stroke = color;

    const pctEl = document.getElementById("pct");
    pctEl.innerHTML = `${pct.toFixed(1)}<span class="sign">%</span>`;
    pctEl.style.color = color;

    document.getElementById("elapsed").textContent = fmtDuration(elapsedMs);
    document.getElementById("remaining").textContent =
      elapsedMs >= WINDOW_MS ? "Done" : fmtDuration(WINDOW_MS - elapsedMs);

    document.getElementById("sinceVal").textContent = fmtDate(start);
    document.getElementById("clearedNote").style.display =
      elapsedMs >= WINDOW_MS ? "block" : "none";

    const elapsedH = elapsedMs / 3600000;
    let nextAssigned = false;
    MILESTONES.forEach(m => {
      m._el.classList.remove("passed", "next");
      if (elapsedH >= m.h) {
        m._el.classList.add("passed");
      } else if (!nextAssigned) {
        m._el.classList.add("next");
        nextAssigned = true;
      }
    });
  }

  const picker = document.getElementById("picker");
  function openPicker() {
    if (startMs == null) return;
    picker.value = toPickerValue(startMs);
    picker.showPicker ? picker.showPicker() : picker.click();
  }
  document.getElementById("sinceRow").addEventListener("click", openPicker);
  document.getElementById("changeBtn").addEventListener("click", openPicker);
  picker.addEventListener("change", () => {
    if (picker.value) {
      const ms = new Date(picker.value).getTime();
      if (!isNaN(ms)) setStart(ms);
    }
  });
  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Restart the 72-hour clock from right now?")) setStart(Date.now());
  });

  startMs = getStart();
  render();
  setInterval(render, 1000);
</script>
</body>
</html>
